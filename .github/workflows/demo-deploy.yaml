name: Deploy to Juno

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC authentication with Juno when deploying.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Prepare
        uses: ./.github/actions/prepare
      - name: Prepare Demo
        uses: ./.github/actions/prepare
        with:
          folder: 'demo'
      - name: Build
        run: npm run build
        working-directory: 'demo'

      - name: Deploy Relying Party
        uses: junobuild/juno-action@99d76780c60c023b5396298f94a7264e0c7ee2b5 # v0.7.5
        with:
          args: hosting deploy
        env:
          PROJECT_PATH: demo/src/relying_party_frontend

      - name: Deploy Signer
        uses: junobuild/juno-action@99d76780c60c023b5396298f94a7264e0c7ee2b5 # v0.7.5
        with:
          args: hosting deploy
        env:
          PROJECT_PATH: demo/src/wallet_frontend
