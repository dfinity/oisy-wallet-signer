name: Lib Publish

on:
  workflow_dispatch:
  release:
    types: [released]

run-name: >-
  ${{
    github.event_name == 'release' && format('Lib Publish {0}', github.event.release.tag_name)
    || github.event_name == 'workflow_dispatch' && 'Lib Next'
    || 'Lib Publish' }}

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-release:
    name: Publish Release
    if: github.event_name == 'release'

    runs-on: ubuntu-latest

    environment: release

    permissions:
      contents: read
      id-token: write # Required for npm provenance, which uses OIDC to sign the published package.

    env:
      dist-directory: dist

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Build
        run: npm run build

      - run: npm publish --provenance --access public
        working-directory: ${{env.dist-directory}}

  publish-next:
    name: Publish Next
    if: github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest

    environment: release

    permissions:
      contents: read
      id-token: write # Required for npm provenance, which uses OIDC to sign the published package.

    env:
      dist-directory: dist

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Build next version
        run: ./scripts/build-next

      - run: npm publish --provenance --access public --tag next
        working-directory: ${{env.dist-directory}}
